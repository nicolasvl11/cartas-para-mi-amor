<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cartas para mi amor</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=Special+Elite&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #f5f0e8;
    --cream-dark: #ede6d4;
    --ink: #2c1f0e;
    --ink-light: #5c4a32;
    --ink-faint: #9c8870;
    --rose: #c4736a;
    --rose-light: #e8b4ae;
    --rose-faint: #f5e6e4;
    --gold: #b8974a;
    --gold-light: #e8d8a8;
    --paper-shadow: rgba(44,31,14,0.12);
  }

  body {
    background: var(--cream-dark);
    font-family: 'Cormorant Garamond', serif;
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.6;
  }

  .view { display: none; min-height: 100vh; }
  .view.active { display: block; }

  /* ============ READER VIEW ============ */
  #reader {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 3rem 1rem 4rem;
    background: radial-gradient(ellipse at 50% 0%, #e8dcc8 0%, var(--cream-dark) 60%);
    min-height: 100vh;
  }
  #reader.active { display: flex; }

  .reader-header {
    text-align: center;
    margin-bottom: 2.5rem;
    animation: fadeDown 0.8s ease both;
  }

  .reader-header .eyebrow {
    font-family: 'Special Elite', monospace;
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 0.5rem;
  }

  .reader-header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 6vw, 3.2rem);
    font-weight: 400;
    font-style: italic;
    color: var(--ink);
    line-height: 1.1;
  }

  .reader-header .subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    color: var(--ink-faint);
    margin-top: 0.4rem;
    font-style: italic;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 0.8rem auto;
    width: fit-content;
  }

  .divider::before, .divider::after {
    content: '';
    width: 40px;
    height: 0.5px;
    background: var(--gold);
  }

  .divider-rose { font-size: 14px; color: var(--rose); }

  .envelope-wrap {
    width: 100%;
    max-width: 560px;
    animation: fadeUp 0.9s ease both 0.2s;
  }

  .envelope {
    background: var(--cream);
    border: 1px solid var(--gold-light);
    border-radius: 4px;
    box-shadow: 0 8px 40px var(--paper-shadow), 0 2px 8px rgba(184,151,74,0.1);
    position: relative;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }

  .envelope:hover { transform: translateY(-3px); box-shadow: 0 14px 50px var(--paper-shadow); }

  .envelope-flap {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 120px;
    background: linear-gradient(170deg, var(--cream-dark) 0%, var(--cream) 100%);
    clip-path: polygon(0 0, 100% 0, 50% 78%);
    border-bottom: 1px solid var(--gold-light);
    z-index: 2;
  }

  .envelope-seal {
    position: absolute;
    top: 52px;
    left: 50%;
    transform: translateX(-50%);
    width: 36px;
    height: 36px;
    background: var(--rose);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 3;
    box-shadow: 0 2px 8px rgba(196,115,106,0.4);
    font-family: 'Playfair Display', serif;
    color: white;
    font-size: 13px;
    font-style: italic;
  }

  .envelope-body {
    padding: 5.5rem 2.5rem 2.5rem;
    text-align: center;
  }

  .envelope-date {
    font-family: 'Special Elite', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--ink-faint);
    text-transform: uppercase;
    margin-bottom: 1rem;
  }

  .envelope-hint {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: var(--ink-light);
    font-size: 1.1rem;
  }

  .letter-paper {
    display: none;
    max-width: 560px;
    width: 100%;
    margin-top: 1.5rem;
    animation: unfold 0.6s ease both;
  }

  .letter-paper.open { display: block; }

  @keyframes unfold {
    from { opacity: 0; transform: scaleY(0.3) translateY(-40px); transform-origin: top; }
    to { opacity: 1; transform: scaleY(1) translateY(0); }
  }

  .paper {
    background: var(--cream);
    border: 1px solid var(--gold-light);
    border-radius: 2px;
    padding: 3rem 3rem 3.5rem;
    box-shadow: 0 4px 20px var(--paper-shadow);
    position: relative;
  }

  .paper::before {
    content: '';
    position: absolute;
    left: 72px;
    top: 0; bottom: 0;
    width: 1px;
    background: var(--rose-light);
    opacity: 0.5;
  }

  .paper-lines {
    position: absolute;
    inset: 0;
    background-image: repeating-linear-gradient(
      transparent,
      transparent 31px,
      rgba(184,151,74,0.08) 31px,
      rgba(184,151,74,0.08) 32px
    );
    pointer-events: none;
  }

  .letter-date-line {
    font-family: 'Special Elite', monospace;
    font-size: 11px;
    color: var(--ink-faint);
    letter-spacing: 2px;
    text-align: right;
    margin-bottom: 1.8rem;
    position: relative;
  }

  .letter-salutation {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    font-style: italic;
    color: var(--rose);
    margin-bottom: 1.4rem;
    position: relative;
  }

  .letter-body {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.15rem;
    line-height: 2;
    color: var(--ink);
    position: relative;
    white-space: pre-wrap;
  }

  .letter-closing {
    margin-top: 2rem;
    font-family: 'Playfair Display', serif;
    font-style: italic;
    color: var(--ink-light);
    font-size: 1.1rem;
    position: relative;
  }

  .letter-signature {
    margin-top: 0.5rem;
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    font-style: italic;
    color: var(--rose);
    position: relative;
  }

  .letter-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 1.5rem;
    max-width: 560px;
    width: 100%;
  }

  .nav-btn {
    font-family: 'Special Elite', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--ink-faint);
    background: none;
    border: 0.5px solid var(--gold-light);
    padding: 8px 16px;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .nav-btn:hover { color: var(--ink); border-color: var(--gold); background: rgba(184,151,74,0.05); }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }

  .nav-count {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 0.9rem;
    color: var(--ink-faint);
  }

  /* ============ ADMIN VIEW ============ */
  #admin {
    display: none;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 4rem;
    min-height: 100vh;
    background: var(--cream-dark);
  }
  #admin.active { display: flex; }

  .admin-header {
    width: 100%;
    max-width: 700px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 2rem;
  }

  .admin-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    font-style: italic;
    color: var(--ink);
  }

  .btn-back {
    font-family: 'Special Elite', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    background: none;
    border: 0.5px solid var(--ink-faint);
    color: var(--ink-faint);
    padding: 6px 12px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
  }
  .btn-back:hover { color: var(--ink); border-color: var(--ink); }

  .admin-panel {
    width: 100%;
    max-width: 700px;
    display: grid;
    gap: 1.5rem;
  }

  .panel-card {
    background: var(--cream);
    border: 1px solid var(--gold-light);
    border-radius: 4px;
    padding: 1.8rem;
    box-shadow: 0 2px 12px var(--paper-shadow);
  }

  .panel-card h3 {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    font-style: italic;
    color: var(--ink);
    margin-bottom: 1rem;
    padding-bottom: 0.7rem;
    border-bottom: 0.5px solid var(--gold-light);
  }

  .field-row { margin-bottom: 1rem; }

  .field-row label {
    display: block;
    font-family: 'Special Elite', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 6px;
  }

  .field-row input, .field-row textarea, .field-row select {
    width: 100%;
    background: var(--cream-dark);
    border: 0.5px solid var(--gold-light);
    border-radius: 2px;
    padding: 10px 14px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.05rem;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
    resize: vertical;
  }

  .field-row input:focus, .field-row textarea:focus {
    border-color: var(--rose);
    background: var(--rose-faint);
  }

  .field-row textarea { min-height: 140px; line-height: 1.7; }

  .ai-tabs {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 1rem;
  }

  .ai-tab {
    font-family: 'Special Elite', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    background: var(--cream-dark);
    border: 0.5px solid var(--gold-light);
    color: var(--ink-light);
    padding: 6px 14px;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .ai-tab:hover, .ai-tab.active { background: var(--rose); color: white; border-color: var(--rose); }

  .ai-prompt-area { margin-bottom: 1rem; }

  .ai-prompt-area input {
    width: 100%;
    background: var(--cream-dark);
    border: 0.5px solid var(--gold-light);
    border-radius: 2px;
    padding: 10px 14px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    color: var(--ink);
    outline: none;
  }

  .ai-prompt-area input:focus { border-color: var(--rose); background: var(--rose-faint); }

  .btn-ai {
    font-family: 'Special Elite', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    background: var(--rose);
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.2s;
    width: 100%;
  }

  .btn-ai:hover { background: #b5635a; }
  .btn-ai:disabled { opacity: 0.5; cursor: default; }

  .ai-response {
    display: none;
    margin-top: 1rem;
    background: var(--rose-faint);
    border: 0.5px solid var(--rose-light);
    border-radius: 2px;
    padding: 1rem 1.2rem;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    color: var(--ink);
    line-height: 1.7;
    white-space: pre-wrap;
  }

  .ai-response.visible { display: block; }

  .btn-use-suggestion {
    margin-top: 0.8rem;
    font-family: 'Special Elite', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    background: none;
    border: 0.5px solid var(--rose);
    color: var(--rose);
    padding: 6px 14px;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-use-suggestion:hover { background: var(--rose); color: white; }

  .letter-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 0.5px solid var(--gold-light);
    cursor: pointer;
    transition: all 0.15s;
  }

  .letter-item:last-child { border-bottom: none; }
  .letter-item:hover { padding-left: 6px; }

  .letter-item-date {
    font-family: 'Special Elite', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    color: var(--ink-faint);
  }

  .letter-item-preview {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: var(--ink-light);
    font-size: 0.95rem;
    flex: 1;
    margin: 0 1rem;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .letter-item-del {
    background: none;
    border: none;
    color: var(--rose-light);
    cursor: pointer;
    font-size: 14px;
    padding: 2px 6px;
    transition: color 0.2s;
  }

  .letter-item-del:hover { color: var(--rose); }

  .btn-save {
    width: 100%;
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 1.1rem;
    background: var(--ink);
    color: var(--cream);
    border: none;
    padding: 14px;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 0.5rem;
  }

  .btn-save:hover { background: var(--rose); }

  /* LOGIN */
  #login-screen {
    position: fixed;
    inset: 0;
    background: var(--cream-dark);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 500;
    transition: opacity 0.4s ease;
  }

  #login-screen.hidden { opacity: 0; pointer-events: none; }

  .login-box {
    background: var(--cream);
    border: 1px solid var(--gold-light);
    border-radius: 4px;
    padding: 2.5rem;
    width: 300px;
    box-shadow: 0 8px 40px var(--paper-shadow);
    text-align: center;
  }

  .login-box h2 {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 1.4rem;
    color: var(--ink);
    margin-bottom: 0.4rem;
  }

  .login-box p {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 0.95rem;
    color: var(--ink-faint);
    margin-bottom: 1.5rem;
  }

  .login-box input {
    width: 100%;
    background: var(--cream-dark);
    border: 0.5px solid var(--gold-light);
    border-radius: 2px;
    padding: 10px 14px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    color: var(--ink);
    text-align: center;
    letter-spacing: 4px;
    outline: none;
    margin-bottom: 1rem;
  }

  .login-box input:focus { border-color: var(--rose); }

  .login-box button {
    width: 100%;
    background: var(--rose);
    color: white;
    border: none;
    padding: 10px;
    border-radius: 2px;
    font-family: 'Special Elite', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s;
  }

  .login-box button:hover { background: #b5635a; }

  .login-err {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 0.85rem;
    color: var(--rose);
    margin-top: 0.5rem;
    min-height: 1.2rem;
  }

  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--ink);
    color: var(--cream);
    font-family: 'Special Elite', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 12px 24px;
    border-radius: 2px;
    transition: transform 0.4s ease;
    z-index: 999;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  .secret-zone {
    position: fixed;
    bottom: 0; right: 0;
    width: 60px; height: 60px;
    cursor: default;
    z-index: 100;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .rose-deco {
    position: fixed;
    pointer-events: none;
    opacity: 0.07;
    font-size: 120px;
    user-select: none;
  }

  .rose-deco.tl { top: -20px; left: -20px; transform: rotate(-20deg); }
  .rose-deco.br { bottom: -20px; right: -20px; transform: rotate(160deg); }
</style>
</head>
<body>

<div class="rose-deco tl">❧</div>
<div class="rose-deco br">❧</div>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-box">
    <h2>Panel secreto</h2>
    <p>Solo para quien escribe estas cartas...</p>
    <input type="password" id="pwd-input" placeholder="••••••" maxlength="20">
    <button onclick="tryLogin()">Entrar</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- READER VIEW -->
<div id="reader" class="view active">
  <div class="reader-header">
    <div class="eyebrow">Una carta para ti</div>
    <h1>Para mi amorcito</h1>
    <div class="divider"><div class="divider-rose">✦</div></div>
    <div class="subtitle">con todo mi amor</div>
  </div>

  <div class="envelope-wrap">
    <div class="envelope" id="envelope" onclick="openEnvelope()">
      <div class="envelope-flap"></div>
      <div class="envelope-seal">S</div>
      <div class="envelope-body">
        <div class="envelope-date" id="env-date">Cargando...</div>
        <div class="envelope-hint">Haz clic para abrir tu carta de hoy ✦</div>
      </div>
    </div>

    <div class="letter-paper" id="letter-paper">
      <div class="paper">
        <div class="paper-lines"></div>
        <div class="letter-date-line" id="letter-date"></div>
        <div class="letter-salutation" id="letter-salutation"></div>
        <div class="letter-body" id="letter-body"></div>
        <div class="letter-closing" id="letter-closing"></div>
        <div class="letter-signature" id="letter-signature"></div>
      </div>
    </div>

    <div class="letter-nav" id="letter-nav" style="display:none;">
      <button class="nav-btn" id="btn-prev" onclick="prevLetter()">← Anterior</button>
      <div class="nav-count" id="nav-count"></div>
      <button class="nav-btn" id="btn-next" onclick="nextLetter()">Siguiente →</button>
    </div>
  </div>
</div>

<!-- ADMIN VIEW -->
<div id="admin" class="view">
  <div class="admin-header">
    <div class="admin-title">✦ Panel de cartas</div>
    <button class="btn-back" onclick="goToReader()">← Volver</button>
  </div>

  <div class="admin-panel">

    <div class="panel-card">
      <h3>Pídele ideas a Claude ✦</h3>
      <div class="ai-tabs">
        <button class="ai-tab active" onclick="setAiMode(this,'mensaje')">Mensaje de hoy</button>
        <button class="ai-tab" onclick="setAiMode(this,'apertura')">Frase de apertura</button>
        <button class="ai-tab" onclick="setAiMode(this,'cierre')">Cierre romántico</button>
        <button class="ai-tab" onclick="setAiMode(this,'libre')">Idea libre</button>
      </div>
      <div class="ai-prompt-area">
        <input type="text" id="ai-extra" placeholder="Añade contexto (ej: hoy fue un día difícil, quiero hacerla reír...)">
      </div>
      <button class="btn-ai" id="btn-ai" onclick="askClaude()">✦ Generar idea</button>
      <div class="ai-response" id="ai-response">
        <span id="ai-text"></span>
        <br>
        <button class="btn-use-suggestion" onclick="useSuggestion()">Usar esta idea →</button>
      </div>
    </div>

    <div class="panel-card">
      <h3>Escribir carta de hoy</h3>
      <div class="field-row">
        <label>Saludo</label>
        <input type="text" id="f-salutation" placeholder="Mi reina hermosa," value="Mi reina hermosa,">
      </div>
      <div class="field-row">
        <label>Cuerpo de la carta</label>
        <textarea id="f-body" placeholder="Escribe tu carta aquí..."></textarea>
      </div>
      <div class="field-row">
        <label>Cierre</label>
        <input type="text" id="f-closing" placeholder="Con todo mi amor," value="Con todo mi amor,">
      </div>
      <div class="field-row">
        <label>Firma</label>
        <input type="text" id="f-signature" placeholder="Tu amor" value="Tu amor">
      </div>
      <button class="btn-save" onclick="saveLetter()">Guardar carta de hoy ✦</button>
    </div>

    <div class="panel-card">
      <h3>Cartas guardadas</h3>
      <div id="letters-list"><em style="font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--ink-faint);font-size:0.9rem;">Aún no hay cartas guardadas.</em></div>
    </div>

  </div>
</div>

<div class="secret-zone" id="secret-zone"></div>
<div class="toast" id="toast"></div>

<script>
const ADMIN_PASSWORD = "amor";
const SUPABASE_URL = "https://qdlcmcngnojoobeqkidz.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFkbGNtY25nbm9qb29iZXFraWR6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1Mzc0MjEsImV4cCI6MjA5MDExMzQyMX0.-RXq4lqU9MdYUD0sbKScPNXPFAusXxiNyH4eNd5rzXk";

let letters = [];
let currentIdx = 0;
let aiMode = 'mensaje';
let lastAiText = '';
let secretClicks = 0;
let secretTimer = null;

async function dbFetch(path, opts = {}) {
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
    ...opts,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation',
      ...(opts.headers || {})
    }
  });
  if (!res.ok) throw new Error(await res.text());
  const text = await res.text();
  return text ? JSON.parse(text) : [];
}

async function load() {
  try {
    const data = await dbFetch('cartas?order=date.asc');
    letters = data;
  } catch(e) {
    letters = [];
  }
  if (letters.length === 0) {
    const primera = {
      date: new Date().toISOString().split('T')[0],
      salutation: 'Mi vida preciosa,',
      body: 'Esta es la primera carta de muchas.\n\nCreé este pequeño rincón solo para ti, para que cada día, cuando abras esto, sepas que estuve pensando en ti.\n\nEres la persona más hermosa que ha llegado a mi vida, y quiero que lo recuerdes todos los días.',
      closing: 'Con todo mi corazón,',
      signature: 'Tu amor'
    };
    try {
      const saved = await dbFetch('cartas', { method: 'POST', body: JSON.stringify(primera) });
      letters = Array.isArray(saved) ? saved : [saved];
    } catch(e) { letters = [primera]; }
  }
  currentIdx = letters.length - 1;
  updateEnvelope();
}

async function saveLetter() {
  const sal = document.getElementById('f-salutation').value.trim();
  const body = document.getElementById('f-body').value.trim();
  const closing = document.getElementById('f-closing').value.trim();
  const sig = document.getElementById('f-signature').value.trim();
  if (!body) { showToast('Escribe algo en la carta ✦'); return; }

  const today = new Date().toISOString().split('T')[0];
  const letter = { date: today, salutation: sal, body, closing, signature: sig };
  const existing = letters.find(l => l.date === today);

  try {
    if (existing) {
      await dbFetch(`cartas?date=eq.${today}`, {
        method: 'PATCH',
        body: JSON.stringify(letter)
      });
    } else {
      await dbFetch('cartas', { method: 'POST', body: JSON.stringify(letter) });
    }
    const data = await dbFetch('cartas?order=date.asc');
    letters = data;
    renderLettersList();
    document.getElementById('f-body').value = '';
    showToast('¡Carta guardada con amor! ✦');
  } catch(e) {
    showToast('Error al guardar. Intenta de nuevo.');
  }
}

async function deleteLetter(i) {
  const l = letters[i];
  try {
    await dbFetch(`cartas?date=eq.${l.date}`, { method: 'DELETE' });
    const data = await dbFetch('cartas?order=date.asc');
    letters = data;
    renderLettersList();
    showToast('Carta eliminada');
  } catch(e) {
    showToast('Error al eliminar.');
  }
}

function formatDate(iso) {
  const [y, m, d] = iso.split('-');
  const months = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  return `${parseInt(d)} de ${months[parseInt(m)-1]} de ${y}`;
}

function showReader() {
  document.getElementById('admin').style.display = 'none';
  document.getElementById('admin').classList.remove('active');
  document.getElementById('reader').style.display = 'flex';
  document.getElementById('reader').classList.add('active');
  currentIdx = letters.length - 1;
  updateEnvelope();
}

function updateEnvelope() {
  const l = letters[currentIdx];
  if (!l) return;
  document.getElementById('env-date').textContent = formatDate(l.date).toUpperCase();
  document.getElementById('letter-paper').classList.remove('open');
  document.getElementById('letter-nav').style.display = 'none';
  document.getElementById('envelope').style.display = '';
}

function openEnvelope() {
  const l = letters[currentIdx];
  if (!l) return;
  document.getElementById('envelope').style.display = 'none';
  document.getElementById('letter-date').textContent = formatDate(l.date).toUpperCase();
  document.getElementById('letter-salutation').textContent = l.salutation;
  document.getElementById('letter-closing').textContent = l.closing;
  document.getElementById('letter-signature').textContent = l.signature;
  document.getElementById('letter-paper').classList.add('open');

  const bodyEl = document.getElementById('letter-body');
  bodyEl.textContent = '';
  const text = l.body;
  let i = 0;
  function type() {
    if (i < text.length) {
      bodyEl.textContent += text[i];
      i++;
      setTimeout(type, text[i] === '\n' ? 80 : Math.random() * 35 + 18);
    }
  }
  type();

  if (letters.length > 1) {
    document.getElementById('letter-nav').style.display = 'flex';
    updateNav();
  }
}

function updateNav() {
  document.getElementById('btn-prev').disabled = currentIdx === 0;
  document.getElementById('btn-next').disabled = currentIdx === letters.length - 1;
  document.getElementById('nav-count').textContent = `carta ${currentIdx + 1} de ${letters.length}`;
}

function prevLetter() { if (currentIdx > 0) { currentIdx--; updateEnvelope(); } }
function nextLetter() { if (currentIdx < letters.length - 1) { currentIdx++; updateEnvelope(); } }

function goToReader() { showReader(); }

function showAdmin() {
  document.getElementById('reader').style.display = 'none';
  document.getElementById('reader').classList.remove('active');
  document.getElementById('admin').style.display = 'flex';
  document.getElementById('admin').classList.add('active');
  renderLettersList();
}

function renderLettersList() {
  const el = document.getElementById('letters-list');
  if (letters.length === 0) {
    el.innerHTML = '<em style="font-family:\'Cormorant Garamond\',serif;font-style:italic;color:var(--ink-faint);font-size:0.9rem;">Aún no hay cartas guardadas.</em>';
    return;
  }
  el.innerHTML = letters.map((l, i) => `
    <div class="letter-item" onclick="editLetter(${i})">
      <div class="letter-item-date">${formatDate(l.date).toUpperCase()}</div>
      <div class="letter-item-preview">${l.body.slice(0, 60)}...</div>
      <button class="letter-item-del" onclick="event.stopPropagation();deleteLetter(${i})">✕</button>
    </div>
  `).join('');
}

function editLetter(i) {
  const l = letters[i];
  document.getElementById('f-salutation').value = l.salutation;
  document.getElementById('f-body').value = l.body;
  document.getElementById('f-closing').value = l.closing;
  document.getElementById('f-signature').value = l.signature;
  showToast('Carta cargada para editar');
}

document.getElementById('secret-zone').addEventListener('click', () => {
  secretClicks++;
  clearTimeout(secretTimer);
  secretTimer = setTimeout(() => { secretClicks = 0; }, 2000);
  if (secretClicks >= 5) {
    secretClicks = 0;
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('login-screen').classList.remove('hidden');
  }
});

function tryLogin() {
  const val = document.getElementById('pwd-input').value;
  if (val === ADMIN_PASSWORD) {
    document.getElementById('login-screen').classList.add('hidden');
    setTimeout(() => { document.getElementById('login-screen').style.display = 'none'; }, 400);
    document.getElementById('pwd-input').value = '';
    document.getElementById('login-err').textContent = '';
    showAdmin();
  } else {
    document.getElementById('login-err').textContent = 'Contraseña incorrecta, mi amor...';
    document.getElementById('pwd-input').value = '';
  }
}

document.getElementById('pwd-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') tryLogin();
});

document.getElementById('login-screen').style.display = 'none';

function setAiMode(el, mode) {
  aiMode = mode;
  document.querySelectorAll('.ai-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
}

async function askClaude() {
  const extra = document.getElementById('ai-extra').value;
  const btn = document.getElementById('btn-ai');
  const resp = document.getElementById('ai-response');
  const textEl = document.getElementById('ai-text');

  const prompts = {
    mensaje: `Eres un asistente romántico que ayuda a escribir cartas de amor en español. El escritor le escribe todos los días a su novia Sofía, a quien llama con cariño: "mi reina", "mi reina hermosa", "mi princesa hermosa", "amor de mi vida", "mi vida preciosa". Escribe el cuerpo de una carta de amor corta (3-5 párrafos), sincera y poética, con un tono íntimo, cálido y elegante. Estilo: carta a mano, romántico, sin clichés baratos. ${extra ? 'Contexto extra: ' + extra : ''}`,
    apertura: `Escribe 3 frases de apertura originales y románticas en español para una carta de amor a Sofía. El escritor la llama: mi reina, mi reina hermosa, mi princesa, amor de mi vida, mi vida preciosa. Que sean elegantes, íntimas y distintas entre sí. Solo las frases, sin explicación. ${extra ? 'Contexto: ' + extra : ''}`,
    cierre: `Escribe 3 cierres románticos y elegantes en español para terminar una carta de amor a Sofía. Que sean originales, cálidos y variados. Solo los cierres, sin explicación. ${extra ? 'Contexto: ' + extra : ''}`,
    libre: `Eres un asistente creativo para cartas de amor. Da una idea creativa o sugerencia especial para que alguien sorprenda a su novia Sofía a través de una carta escrita. Puede ser un tema, una estructura especial, una metáfora, un recurso literario, o una idea temática. En español, elegante y romántico. ${extra ? 'Contexto: ' + extra : ''}`
  };

  btn.disabled = true;
  btn.textContent = '✦ Pensando...';
  resp.classList.remove('visible');
  textEl.textContent = '';

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompts[aiMode] }]
      })
    });

    const data = await response.json();
    lastAiText = data.content?.[0]?.text || 'No pude generar una idea, intenta de nuevo.';
    resp.classList.add('visible');
    let i = 0;
    function typeAi() {
      if (i < lastAiText.length) {
        textEl.textContent += lastAiText[i];
        i++;
        setTimeout(typeAi, 12);
      }
    }
    typeAi();
  } catch(e) {
    resp.classList.add('visible');
    textEl.textContent = 'Hubo un error al conectar con Claude. Intenta de nuevo.';
    lastAiText = '';
  }

  btn.disabled = false;
  btn.textContent = '✦ Generar idea';
}

function useSuggestion() {
  if (!lastAiText) return;
  if (aiMode === 'mensaje') {
    document.getElementById('f-body').value = lastAiText;
  } else {
    const cur = document.getElementById('f-body').value;
    document.getElementById('f-body').value = cur ? cur + '\n\n' + lastAiText : lastAiText;
  }
  showToast('Idea añadida a la carta ✦');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

load().then(() => showReader());
</script>
</body>
</html>
